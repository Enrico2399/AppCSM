<ion-header>
  <ion-toolbar color="primary">
    <ion-title>CSM Treviso - Monitoraggio</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">Logout</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="filter-bar">
    <button [class.active]="isCategorySelected('all')" (click)="toggleCategory('all')">Tutti</button>
    <button [class.active]="isCategorySelected('urgent')" (click)="toggleCategory('urgent')">🆘 Urgente</button>
    <button [class.active]="isCategorySelected('info')" (click)="toggleCategory('info')">ℹ️ Info</button>
    <button [class.active]="isCategorySelected('success')" (click)="toggleCategory('success')">✅ Risolto</button>
  </div>

  <div id="map" style="height: calc(100% - 60px); width: 100%;"></div>
  
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="aggiungiSegnalazione()" aria-label="Aggiungi segnalazione">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
